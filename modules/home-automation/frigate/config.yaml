objects:
  track:
    - person
    - dog
    - car
  filters:
    person:
      min_area: 5000
      max_area: 100000
      # min_score: 0.75
      # threshold: 0.75
      threshold: 0.8
version: 0.16-0
camera_groups:
  Parent:
    order: 1
    icon: LuDoorClosed
    cameras:
      - frente_esquerda
      - garagem
  Street:
    order: 2
    icon: LuCar
    cameras: frente_esquerda
semantic_search:
  enabled: true
  reindex: false
  model_size: small
detect:
  enabled: true
