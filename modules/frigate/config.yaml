mqtt:
  enabled: False

detectors: # <---- add detectors
  coral:
    type: edgetpu
    device: usb

cameras:
  frente_esquerda: # <------ Name the camera
    ffmpeg:
      hwaccel_args: preset-vaapi
      inputs:
        - path: rtsp://10.1.1.12:554/user=admin&password={FRIGATE_PASSWORD}&channel=1&stream=1.sdp
          roles:
          - detect
          - record
    detect:
      enabled: True # <---- disable detection until you have a working camera feed
      width: 1280 # <---- update for your camera's resolution
      height: 720 # <---- update for your camera's resolution
      fps: 5
    snapshots:
      enabled: True
      bounding_box: False
      required_zones:
       - varanda
       - portao
    rtmp:
      enabled: False
    zones:  
      varanda:
        coordinates: 1204,720,1280,720,0,720,0,0,180,0
        objects:
          - person
          - cat
      portao:
        coordinates: 606,0,1280,403,1280,602,1157,634,252,0
        objects:
          - person
    record:
      enabled: True
      events:
        retain:
          mode: motion
          default: 10
        objects:
          - person
          - cat
  frente_direita:
    ffmpeg:
      hwaccel_args: preset-vaapi
      inputs:
        - path: rtsp://10.1.1.11:554/user=lluz&password={FRIGATE_PASSWORD}&ch02.264?dev=1/live
          roles:
          - detect
        - path: rtsp://10.1.1.11:554/user=lluz&password={FRIGATE_PASSWORD}&ch01.264?dev=1/live
          roles:
          - record
    detect:
      enabled: True # <---- disable detection until you have a working camera feed
      width: 1280 # <---- update for your camera's resolution
      height: 720 # <---- update for your camera's resolution
      fps: 5
    zones:  
      varanda_direita:
        coordinates: 1123,720,1280,524,1280,363,1219,318,640,634,629,720
        objects:
          - person
          - cat
      portao_direita:
        coordinates: 555,548,859,429,734,367,552,435
        objects:
          - person
    motion:
      mask:
        - 0,720,0,309,99,226,200,187,285,194,552,429,486,578,270,720
    snapshots:
      enabled: True
      bounding_box: False
      required_zones:
       - varanda_d 
       - portao_d
    record:
      enabled: True
      events:
        retain:
          default: 10
          mode: motion
        objects:
          - person
          - cat
objects:
  track:
    - person
    - cat
  filters:
    person:
      min_area: 5000
      max_area: 100000
