mqtt:
  enabled: False

detectors: # <---- add detectors
  coral:
    type: edgetpu
    device: usb

cameras:
  frente_esquerda: # <------ Name the camera
    ffmpeg:
      hwaccel_args: preset-vaapi
      inputs:
        - path: rtsp://10.1.1.12:554/user=admin&password={FRIGATE_PASSWORD}&channel=1&stream=1.sdp
          roles:
          - detect
          - record
    detect:
      enabled: True # <---- disable detection until you have a working camera feed
      width: 1280 # <---- update for your camera's resolution
      height: 720 # <---- update for your camera's resolution
      fps: 5
    snapshots:
      enabled: True
      bounding_box: False
      required_zones:
       - calcada_direita
       - calcada_esquerda
       - portao_fora
       - portao_dentro
    rtmp:
      enabled: False
    zones:  
      portao_fora:
        coordinates: 322,177,742,156,771,240,297,241
        objects:
          - person
      portao_dentro:
        coordinates: 537,720,65,720,90,451,558,467
        objects:
          - person
      calcada_direita:
        coordinates: 1280,245,805,237,817,76,1280,69
        objects:
          - person
      calcada_esquerda:
        coordinates: 328,126,0,131,0,249,305,233
        objects:
          - person
    record:
      enabled: True
      events:
        retain:
          mode: motion
          default: 10
        objects:
          - person
  frente_direita:
    ffmpeg:
      hwaccel_args: preset-vaapi
      inputs:
        - path: rtsp://10.1.1.11:554/user=lluz&password={FRIGATE_PASSWORD}&ch02.264?dev=1/live
          roles:
          - detect
        - path: rtsp://10.1.1.11:554/user=lluz&password={FRIGATE_PASSWORD}&ch01.264?dev=1/live
          roles:
          - record
    detect:
      enabled: True # <---- disable detection until you have a working camera feed
      width: 1280 # <---- update for your camera's resolution
      height: 720 # <---- update for your camera's resolution
      fps: 5
    zones:  
      varanda:
        coordinates: 1280,720,1280,265,507,720
        objects:
          - person
          - cat
      frente_portao:
        coordinates: 889,503,1033,423,958,364,813,444
        objects:
          - person
          - motorcycle
    motion:
      mask:
        - 0,720,0,317,333,235,571,246,897,356,824,550,472,720
    snapshots:
      enabled: True
      bounding_box: False
      #required_zones:
        #- varanda_d 
        #- portao_d
    record:
      enabled: True
      events:
        retain:
          default: 10
          mode: motion
        objects:
          - person
          - cat
objects:
  track:
    - person
    - cat
    - motorcycle
  filters:
    person:
      min_area: 5000
      max_area: 100000
